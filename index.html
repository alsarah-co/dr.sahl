<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>د. سهل قزاز - بطاقة تعريف</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --primary: #5C1414;
    --primary-light: #7a1c1c;
    --primary-dark: #3d0d0d;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --bg: #f5f0eb;
    --card-bg: #ffffff;
    --text-dark: #1a1a1a;
    --text-muted: #6b6b6b;
    --border: #e8e0d8;
  }

  body {
    font-family: 'Noto Kufi Arabic', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background-image: 
      radial-gradient(ellipse at top right, rgba(92,20,20,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at bottom left, rgba(201,168,76,0.06) 0%, transparent 60%);
  }

  .card {
    width: 100%;
    max-width: 420px;
    background: var(--card-bg);
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(92,20,20,0.15), 0 4px 20px rgba(0,0,0,0.08);
    animation: fadeUp 0.6s ease forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Header */
  .header {
    background: linear-gradient(145deg, var(--primary-dark) 0%, var(--primary) 50%, var(--primary-light) 100%);
    padding: 40px 30px 50px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .header::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse, rgba(201,168,76,0.12) 0%, transparent 60%);
    pointer-events: none;
  }

  .header::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--gold), var(--gold-light), var(--gold), transparent);
  }

  .photo-wrapper {
    position: relative;
    display: inline-block;
    margin-bottom: 20px;
  }

  .photo-ring {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    padding: 3px;
    background: linear-gradient(135deg, var(--gold), var(--gold-light), var(--gold));
    display: inline-block;
    box-shadow: 0 8px 30px rgba(0,0,0,0.3);
  }

  .photo-ring img {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
    object-position: center top;
    display: block;
    border: 3px solid var(--primary-dark);
  }

  .name {
    color: #ffffff;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
    text-shadow: 0 2px 10px rgba(0,0,0,0.3);
  }

  .title {
    color: var(--gold-light);
    font-size: 14px;
    font-weight: 500;
    line-height: 1.6;
    opacity: 0.95;
  }

  /* Download button */
  .download-btn {
    display: block;
    margin: 24px 24px 0;
    padding: 14px;
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    color: white;
    text-align: center;
    border-radius: 12px;
    font-family: 'Noto Kufi Arabic', sans-serif;
    font-size: 15px;
    font-weight: 600;
    text-decoration: none;
    cursor: pointer;
    border: none;
    width: calc(100% - 48px);
    box-shadow: 0 4px 15px rgba(92,20,20,0.3);
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  .download-btn::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    transition: left 0.4s;
  }

  .download-btn:hover::before { left: 100%; }
  .download-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(92,20,20,0.4); }
  .download-btn:active { transform: translateY(0); }

  /* Contact info */
  .info-section {
    padding: 20px 24px 30px;
  }

  .info-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    border-radius: 12px;
    margin-bottom: 10px;
    background: #faf8f5;
    border: 1px solid var(--border);
    text-decoration: none;
    color: inherit;
    transition: all 0.25s ease;
    cursor: pointer;
  }

  .info-item:hover {
    background: #fff5f5;
    border-color: rgba(92,20,20,0.2);
    transform: translateX(-3px);
    box-shadow: 0 4px 15px rgba(92,20,20,0.08);
  }

  .info-icon {
    width: 42px;
    height: 42px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 3px 10px rgba(92,20,20,0.25);
  }

  .info-icon svg {
    width: 20px;
    height: 20px;
    fill: white;
  }

  .info-text {
    flex: 1;
    min-width: 0;
  }

  .info-label {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 500;
    margin-bottom: 3px;
    display: block;
  }

  .info-value {
    font-size: 14px;
    color: var(--text-dark);
    font-weight: 600;
    display: block;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    direction: ltr;
    text-align: right;
  }

  .info-value.website {
    color: var(--primary);
  }

  /* Divider */
  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
    margin: 4px 0 14px;
  }

  /* Footer */
  .footer {
    text-align: center;
    padding: 0 24px 24px;
  }

  .footer-logo {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 400;
  }

  .gold-line {
    width: 60px;
    height: 2px;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    margin: 0 auto 12px;
    border-radius: 2px;
  }
</style>
</head>
