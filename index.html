<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>د. سهل قزاز | Dr. Sahl Qazzaz</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #111 0%, #1a1a1a 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      color: #fff;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: #151515;
      border: 1px solid rgba(212, 175, 55, 0.25);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.45);
    }

    .header {
      padding: 32px 24px 20px;
      text-align: center;
      background: linear-gradient(180deg, #1d1d1d 0%, #151515 100%);
    }

    .avatar {
      width: 112px;
      height: 112px;
      margin: 0 auto 16px;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid #d4af37;
      background: #222;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .name-ar,
    .title-ar,
    .name-en,
    .title-en {
      display: none;
    }

    .card[data-lang="ar"] .name-ar,
    .card[data-lang="ar"] .title-ar,
    .card[data-lang="en"] .name-en,
    .card[data-lang="en"] .title-en {
      display: block;
    }

    .name-ar,
    .name-en {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #fff;
    }

    .title-ar,
    .title-en {
      font-size: 16px;
      color: #d4af37;
      margin-bottom: 8px;
    }

    .lang-toggle {
      display: flex;
      gap: 10px;
      justify-content: center;
      padding: 0 24px 20px;
    }

    .lang-btn {
      border: 1px solid #d4af37;
      background: transparent;
      color: #d4af37;
      padding: 10px 18px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 14px;
      transition: 0.25s ease;
    }

    .lang-btn.active,
    .lang-btn:hover {
      background: #d4af37;
      color: #111;
    }

    .download-wrap {
      padding: 0 24px 18px;
    }

    .download-btn {
      width: 100%;
      border: none;
      background: #d4af37;
      color: #111;
      font-weight: 700;
      padding: 14px 18px;
      border-radius: 14px;
      cursor: pointer;
      font-size: 15px;
    }

    .download-label-ar,
    .download-label-en {
      display: none;
    }

    .card[data-lang="ar"] .download-label-ar,
    .card[data-lang="en"] .download-label-en {
      display: inline;
    }

    .info-section {
      display: none;
      padding: 0 18px 20px;
    }

    .info-section.visible {
      display: block;
    }

    .info-item {
      display: flex;
      align-items: center;
      gap: 14px;
      text-decoration: none;
      color: #fff;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 12px;
      transition: 0.2s ease;
    }

    .info-item:hover {
      background: rgba(255,255,255,0.06);
      border-color: rgba(212, 175, 55, 0.35);
    }

    .info-icon {
      width: 42px;
      height: 42px;
      min-width: 42px;
      border-radius: 12px;
      background: rgba(212, 175, 55, 0.12);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .info-icon svg {
      width: 20px;
      height: 20px;
      fill: #d4af37;
    }

    .info-text {
      flex: 1;
      min-width: 0;
    }

    .info-label {
      display: block;
      font-size: 13px;
      color: #bdbdbd;
      margin-bottom: 4px;
    }

    .info-value {
      display: block;
      font-size: 16px;
      font-weight: 600;
      word-break: break-word;
    }

    /* إصلاح القيم التي لازم تكون LTR دائمًا */
    .ltr-item {
      direction: ltr;
      text-align: left;
    }

    .ltr-item .info-text,
    .ltr-item .info-label,
    .ltr-item .info-value {
      direction: ltr;
      text-align: left;
      unicode-bidi: plaintext;
    }

    .phone-value,
    .email-value,
    .website-value {
      direction: ltr;
      unicode-bidi: bidi-override;
      text-align: left;
      display: inline-block;
    }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(212,175,55,0.5), transparent);
      margin: 4px 18px 14px;
    }

    .footer {
      padding: 0 24px 24px;
      text-align: center;
    }

    .gold-line {
      width: 70px;
      height: 3px;
      background: #d4af37;
      margin: 0 auto 12px;
      border-radius: 999px;
    }

    .footer-logo {
      color: #bfa15a;
      font-size: 14px;
      letter-spacing: 0.4px;
    }

    @media (max-width: 480px) {
      .name-ar,
      .name-en {
        font-size: 24px;
      }

      .info-value {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>

    <!-- English Info -->
    <div class="info-section" id="info-en">

          <span class="info-label">Phone</span>
          <span class="info-value phone-value">+966 50 117 6677</span>

      <a href="mailto:s.gazzaz@teaa.com.sa" class="info-item ltr-item">
        <div class="info-icon">
          <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>

  </div>

  <script>
    function setLang(lang, button) {
      const card = document.getElementById('card');
      const sections = document.querySelectorAll('.info-section');
      const buttons = document.querySelectorAll('.lang-btn');

      card.setAttribute('data-lang', lang);
      card.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');

      sections.forEach(section => section.classList.remove('visible'));
      document.getElementById('info-' + lang).classList.add('visible');

      buttons.forEach(btn => btn.classList.remove('active'));
      button.classList.add('active');
    }

    function downloadVCard() {
      const vcard = `BEGIN:VCARD
VERSION:3.0
FN:Dr. Sahl Qazzaz
N:Qazzaz;Sahl;;;Dr.
TITLE:Chief Executive Officer
ORG:Al Sarah
TEL;TYPE=CELL:+966501176677
EMAIL:s.gazzaz@teaa.com.sa
URL:https://alsarah.com.sa/
END:VCARD`;

      const blob = new Blob([vcard], { type: 'text/vcard;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'dr_sahl_qazzaz.vcf';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }
  </script>

</body>
</html>
